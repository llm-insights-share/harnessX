id: event-consumer-cn
description: 事件/消息消费者拓扑包（分层、幂等、吞吐预算，中文版）
guides:
  - id: event-handling
    kind: guide.skill
    execution: inferential
    phase: [design, apply]
    source: assets/bundles/event-consumer-cn/skills/event-handling.md
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    phase: [apply, verify]
    source: assets/bundles/event-consumer-cn/constraints/layering.yaml
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    phase: [design, apply, verify]
    source: assets/bundles/event-consumer-cn/skills/performance-budget.md
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    phase: [verify]
    builtin: arch-boundary
    on_fail: block
    fix_hint: "调整 import，使依赖向内：handlers → processors → domain → shared"
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    phase: [verify]
    builtin: budget
    on_fail: warn
    fix_hint: "在 design.md 记录吞吐/延迟影响，或拆分过大的 handler"
suites:
  verification: [spec-validate, spec-trace, arch-boundary, perf-budget]
