id: library-sdk
description: Topology bundle for publishable SDKs/libraries (semver, public API
  surface, bundle size)
guides:
  - id: sdk-design
    kind: guide.skill
    execution: inferential
    source: assets/bundles/library-sdk/skills/sdk-design.md
    stage: dev
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    source: assets/bundles/library-sdk/constraints/layering.yaml
    stage: dev
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    source: assets/bundles/library-sdk/skills/performance-budget.md
    stage: dev
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    builtin: arch-boundary
    on_fail: block
    fix_hint: "Keep dependencies inward: public → internal → shared; never export
      internals directly"
    stage: dev
    task: verify
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    builtin: budget
    on_fail: warn
    fix_hint: Split modules or move optional adapters behind subpath exports
    stage: dev
    task: verify
suites:
  verification:
    - spec-validate
    - spec-trace
    - arch-boundary
    - perf-budget
