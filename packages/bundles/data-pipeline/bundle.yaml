id: data-pipeline
description: Topology bundle for data pipelines (ETL/batch/stream jobs, schema
  contracts, data quality)
guides:
  - id: pipeline-design
    kind: guide.skill
    execution: inferential
    source: assets/bundles/data-pipeline/skills/pipeline-design.md
    stage: dev
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    source: assets/bundles/data-pipeline/constraints/layering.yaml
    stage: dev
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    source: assets/bundles/data-pipeline/skills/performance-budget.md
    stage: dev
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    builtin: arch-boundary
    on_fail: block
    fix_hint: "Keep dependencies inward: jobs → transforms → sources → shared"
    stage: dev
    task: verify
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    builtin: budget
    on_fail: warn
    fix_hint: Split transforms or partition jobs; document SLA impact in design.md
    stage: dev
    task: verify
suites:
  verification:
    - spec-validate
    - spec-trace
    - arch-boundary
    - perf-budget
