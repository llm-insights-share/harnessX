id: data-pipeline
description: Topology bundle for data pipelines (ETL/batch/stream jobs, schema contracts, data quality)
guides:
  - id: pipeline-design
    kind: guide.skill
    execution: inferential
    phase: [design, apply]
    source: assets/bundles/data-pipeline/skills/pipeline-design.md
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    phase: [apply, verify]
    source: assets/bundles/data-pipeline/constraints/layering.yaml
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    phase: [design, apply, verify]
    source: assets/bundles/data-pipeline/skills/performance-budget.md
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    phase: [verify]
    builtin: arch-boundary
    on_fail: block
    fix_hint: "Keep dependencies inward: jobs → transforms → sources → shared"
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    phase: [verify]
    builtin: budget
    on_fail: warn
    fix_hint: "Split transforms or partition jobs; document SLA impact in design.md"
suites:
  verification: [spec-validate, spec-trace, arch-boundary, perf-budget]
