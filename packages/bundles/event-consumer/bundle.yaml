id: event-consumer
description: Topology bundle for event/message consumers (handler layering, idempotency, throughput budgets)
guides:
  - id: event-handling
    kind: guide.skill
    execution: inferential
    phase: [design, apply]
    source: assets/bundles/event-consumer/skills/event-handling.md
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    phase: [apply, verify]
    source: assets/bundles/event-consumer/constraints/layering.yaml
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    phase: [design, apply, verify]
    source: assets/bundles/event-consumer/skills/performance-budget.md
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    phase: [verify]
    builtin: arch-boundary
    on_fail: block
    fix_hint: "Keep dependencies inward: handlers → processors → domain → shared"
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    phase: [verify]
    builtin: budget
    on_fail: warn
    fix_hint: "Record throughput/latency impact in design.md or split oversized handlers"
suites:
  verification: [spec-validate, spec-trace, arch-boundary, perf-budget]
