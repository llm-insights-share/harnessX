id: api-service-cn
description: 后端 API 服务拓扑包（分层架构 + 性能预算，中文版）
guides:
  - id: api-design
    kind: guide.skill
    execution: inferential
    source: assets/bundles/api-service-cn/skills/api-design.md
    stage: dev
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    source: assets/bundles/api-service-cn/constraints/layering.yaml
    stage: dev
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    source: assets/bundles/api-service-cn/skills/performance-budget.md
    stage: dev
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    builtin: arch-boundary
    on_fail: block
    fix_hint: 调整 import，使依赖向内指向：routes → services → repositories
    stage: dev
    task: verify
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    builtin: budget
    on_fail: warn
    fix_hint: 在 design.md 中记录性能影响，或优化热点路径以满足预算
    stage: dev
    task: verify
suites:
  verification:
    - spec-validate
    - spec-trace
    - arch-boundary
    - perf-budget
