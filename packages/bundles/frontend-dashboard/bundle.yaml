id: frontend-dashboard
description: Topology bundle for frontend dashboards (page/component layering,
  bundle size budgets)
guides:
  - id: ui-architecture
    kind: guide.skill
    execution: inferential
    source: assets/bundles/frontend-dashboard/skills/ui-architecture.md
    stage: dev
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    source: assets/bundles/frontend-dashboard/constraints/layering.yaml
    stage: dev
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    source: assets/bundles/frontend-dashboard/skills/performance-budget.md
    stage: dev
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    builtin: arch-boundary
    on_fail: block
    fix_hint: "Keep UI dependencies inward: pages → components → hooks → shared"
    stage: dev
    task: verify
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    builtin: budget
    on_fail: warn
    fix_hint: Split large components or lazy-load routes; document bundle impact in
      design.md
    stage: dev
    task: verify
suites:
  verification:
    - spec-validate
    - spec-trace
    - arch-boundary
    - perf-budget
