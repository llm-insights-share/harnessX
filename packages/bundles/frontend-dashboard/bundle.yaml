id: frontend-dashboard
description: Topology bundle for frontend dashboards (page/component layering, bundle size budgets)
guides:
  - id: ui-architecture
    kind: guide.skill
    execution: inferential
    phase: [design, apply]
    source: assets/bundles/frontend-dashboard/skills/ui-architecture.md
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    phase: [apply, verify]
    source: assets/bundles/frontend-dashboard/constraints/layering.yaml
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    phase: [design, apply, verify]
    source: assets/bundles/frontend-dashboard/skills/performance-budget.md
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    phase: [verify]
    builtin: arch-boundary
    on_fail: block
    fix_hint: "Keep UI dependencies inward: pages → components → hooks → shared"
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    phase: [verify]
    builtin: budget
    on_fail: warn
    fix_hint: "Split large components or lazy-load routes; document bundle impact in design.md"
suites:
  verification: [spec-validate, spec-trace, arch-boundary, perf-budget]
