id: mobile-app
description: Topology bundle for mobile apps (screens/features layering,
  offline, binary size)
guides:
  - id: mobile-architecture
    kind: guide.skill
    execution: inferential
    source: assets/bundles/mobile-app/skills/mobile-architecture.md
    stage: dev
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    source: assets/bundles/mobile-app/constraints/layering.yaml
    stage: dev
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    source: assets/bundles/mobile-app/skills/performance-budget.md
    stage: dev
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    builtin: arch-boundary
    on_fail: block
    fix_hint: "Keep dependencies inward: screens → features → domain → shared"
    stage: dev
    task: verify
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    builtin: budget
    on_fail: warn
    fix_hint: Split large screens; move data access behind domain services
    stage: dev
    task: verify
suites:
  verification:
    - spec-validate
    - spec-trace
    - arch-boundary
    - perf-budget
