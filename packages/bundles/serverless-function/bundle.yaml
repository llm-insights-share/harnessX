id: serverless-function
description: Topology bundle for serverless functions (thin handlers, cold-start
  budgets, stateless)
guides:
  - id: serverless-design
    kind: guide.skill
    execution: inferential
    source: assets/bundles/serverless-function/skills/serverless-design.md
    stage: dev
  - id: layering-rules
    kind: guide.constraint
    execution: computational
    source: assets/bundles/serverless-function/constraints/layering.yaml
    stage: dev
  - id: performance-budget
    kind: guide.skill
    execution: inferential
    source: assets/bundles/serverless-function/skills/performance-budget.md
    stage: dev
sensors:
  - id: arch-boundary
    kind: sensor.arch
    execution: computational
    builtin: arch-boundary
    on_fail: block
    fix_hint: "Keep handlers thin: handlers → services → shared"
    stage: dev
    task: verify
  - id: perf-budget
    kind: sensor.budget
    execution: computational
    builtin: budget
    on_fail: warn
    fix_hint: Reduce cold-start weight; move heavy imports into services with lazy init
    stage: dev
    task: verify
suites:
  verification:
    - spec-validate
    - spec-trace
    - arch-boundary
    - perf-budget
